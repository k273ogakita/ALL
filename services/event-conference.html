<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>イベント・講演会記録プラン | nARK</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#5a9bb8;--blue-text:#1e3d4f;--blue-pale:#f0f8fc;--gray-mid:#dddad4;--white:#fff}
body{font-family:'Noto Sans JP',sans-serif;color:var(--blue-text);line-height:1.8;font-weight:300;font-size:14px}
a{text-decoration:none;color:inherit}
.page-header{background:var(--blue-pale);padding:60px 40px 48px;border-bottom:1px solid var(--gray-mid)}
.back-link{font-size:11px;letter-spacing:.1em;color:var(--accent);margin-bottom:24px;display:inline-block}
.back-link:hover{opacity:.7}
.plan-num{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.25em;color:var(--accent);margin-bottom:8px}
.page-header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,4vw,40px);font-weight:300;letter-spacing:.04em;margin-bottom:8px}
.plan-en{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);opacity:.7}
.content{max-width:800px;margin:0 auto;padding:60px 40px}
.content p{font-size:14px;line-height:2.2;margin-bottom:20px;color:#444}
.cta{text-align:center;padding:60px 40px;background:var(--blue-pale)}
.cta p{margin-bottom:20px;font-size:13px;color:var(--blue-text);opacity:.75}
.cta-btn{display:inline-block;border:1px solid var(--accent);padding:14px 44px;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--blue-text);transition:background .3s,color .3s}
.cta-btn:hover{background:var(--accent);color:var(--white)}
</style>
</head>
<body>

<div class="page-header">
  <a href="../index.html" class="back-link">← TOPに戻る</a>
  <div class="plan-num">03</div>
  <h1>イベント・講演会「記録・広報動画プラン」</h1>
  <p class="plan-en">Event / Conference Plan</p>
</div>

<div class="content">
  <p>地域・行政イベント、講演会、勉強会の記録動画を制作します。</p>
  <p>アーカイブ用としても、SNS・WEB広報用としても使えるよう、複数カメラで臨場感を演出。当日の熱量をそのまま映像に残します。</p>
  <p>「記録として残したい」「次回の集客に使いたい」どちらのニーズにも対応します。</p>
</div>

<div class="cta">
  <p>ご相談は無料です。お気軽にお問い合わせください。</p>
  <a href="../index.html#contact" class="cta-btn">Contact Us</a>
</div>

</body>
</html>
